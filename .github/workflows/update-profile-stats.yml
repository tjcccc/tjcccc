name: Update profile stats

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write

jobs:
  update-profile-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate SVG cards
        run: node scripts/update-profile-stats.mjs
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PROFILE_USERNAME: tjcccc
          PROFILE_DISPLAY_NAME: seesaw game

      - name: Commit generated stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/profile-stats.svg
          git diff --cached --quiet || git commit -m "chore: update profile stats"
          git push
