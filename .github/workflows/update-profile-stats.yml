name: Update profile stats

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write

concurrency:
  group: profile-stats
  cancel-in-progress: true

jobs:
  update-profile-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate SVG card
        run: node scripts/update-profile-stats.mjs
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PROFILE_USERNAME: tjcccc
          PROFILE_DISPLAY_NAME: seesaw game
          PROFILE_STATS_OUTPUT: assets/profile-stats.svg

      - name: Commit updated SVG
        run: |
          if git diff --quiet -- assets/profile-stats.svg; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/profile-stats.svg
          git commit -m "chore(profile): update stats card"
          git push
