name: Deploy profile stats

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: profile-stats-pages
  cancel-in-progress: true

jobs:
  deploy-profile-stats:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Pages
        uses: actions/configure-pages@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate SVG card
        run: node scripts/update-profile-stats.mjs
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PROFILE_USERNAME: tjcccc
          PROFILE_DISPLAY_NAME: seesaw game
          PROFILE_STATS_OUTPUT: dist/profile-stats.svg

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
